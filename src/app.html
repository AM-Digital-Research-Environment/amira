<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Africa Multiple Interactive Research Atlas</title>
		<meta
			name="description"
			content="Research metadata from the Africa Multiple Cluster of Excellence — an international research consortium at the University of Bayreuth linking partner centres across Africa, Brazil, and Germany."
		/>
		<meta name="theme-color" content="#3b82f6" />
		<meta name="color-scheme" content="dark light" />
		<meta name="author" content="Frédérick Madore" />
		<meta name="creator" content="Frédérick Madore" />
		<meta
			name="publisher"
			content="Africa Multiple Cluster of Excellence, University of Bayreuth"
		/>
		<meta name="robots" content="index, follow, max-image-preview:large" />
		<meta name="application-name" content="AMIRA" />
		<meta name="apple-mobile-web-app-title" content="AMIRA" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="format-detection" content="telephone=no" />
		<meta name="google-site-verification" content="KbjWZh0BthgrMFpZpOCeZU982ncRKKXkUTvXLayYBkU" />
		<!--
			Favicon link tags ordered for Google Search:
			Google picks the highest-quality crawlable favicon and recommends >48x48.
			Lead with a 192x192 PNG so Googlebot doesn't fall back to the 32x32.
			Includes a `shortcut icon` alias for older crawlers that look for that
			exact rel value.
			https://developers.google.com/search/docs/appearance/favicon-in-search
		-->
		<link
			rel="icon"
			type="image/png"
			sizes="192x192"
			href="%sveltekit.assets%/icons/icon-192x192.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="512x512"
			href="%sveltekit.assets%/icons/icon-512x512.png"
		/>
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon.png" />
		<link rel="shortcut icon" type="image/png" href="%sveltekit.assets%/icons/icon-192x192.png" />
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="%sveltekit.assets%/icons/apple-touch-icon.png"
		/>
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		%sveltekit.head%
	</head>
	<body
		data-sveltekit-preload-data="hover"
		class="min-h-screen bg-background font-sans antialiased"
	>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
